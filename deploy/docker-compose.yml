# ISP Platform — reference stack for staging/production.
# Copy .env and run: docker compose -f deploy/docker-compose.yml up -d

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    volumes:
      - ../:/var/www/html
    depends_on:
      - postgres
      - redis
    environment:
      APP_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    networks:
      - isp

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ../:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - isp

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: isp_platform
      POSTGRES_USER: isp
      POSTGRES_PASSWORD: isp_secret_change_me
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - isp

  redis:
    image: redis:7-alpine
    networks:
      - isp

  horizon:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: php artisan horizon
    volumes:
      - ../:/var/www/html
    depends_on:
      - app
      - redis
    environment:
      APP_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    networks:
      - isp

volumes:
  pgdata:

networks:
  isp:
